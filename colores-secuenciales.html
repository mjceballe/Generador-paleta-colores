<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas Secuenciales (HSL Dinámico)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6 md:p-10 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto">
        
        <header class="mb-10 text-center">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 tracking-tight">Generador de Paletas Secuenciales</h1>
            <p class="text-gray-500 mt-2 text-lg">(HSL Dinámico - 3 a 10 Pasos)</p>
        </header>

        <!-- Panel de Controles -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 mb-8 max-w-4xl mx-auto flex flex-col md:flex-row items-center gap-8">
            
            <div class="w-full md:w-3/4 grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <div>
                    <label for="in-h" class="block text-xs md:text-sm font-medium text-gray-600 mb-2">Matiz (Hue) [0-360]</label>
                    <input type="number" id="in-h" value="227" min="0" max="360" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all font-mono">
                </div>
                <div>
                    <label for="in-s" class="block text-xs md:text-sm font-medium text-gray-600 mb-2">Saturación (%)</label>
                    <input type="number" id="in-s" value="65" min="0" max="100" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all font-mono">
                </div>
                <div>
                    <label for="in-l" class="block text-xs md:text-sm font-medium text-gray-600 mb-2">Luminosidad (%)</label>
                    <input type="number" id="in-l" value="52" min="0" max="100" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all font-mono">
                </div>
                <div>
                    <label for="in-steps" class="block text-xs md:text-sm font-bold text-indigo-600 mb-2">Pasos [3-10]</label>
                    <input type="number" id="in-steps" value="6" min="3" max="10" class="w-full px-3 py-2 border border-indigo-300 bg-indigo-50 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all font-mono font-bold text-indigo-900">
                </div>
            </div>

            <!-- Color Base Display -->
            <div class="w-full md:w-1/4 flex flex-col items-center">
                <span class="block text-sm font-medium text-gray-600 mb-2">Color Base</span>
                <div id="base-color-box" class="w-full h-16 md:h-20 rounded-xl shadow-inner border border-gray-200 transition-colors duration-200 flex items-center justify-center">
                    <span id="base-color-hex" class="font-mono text-white drop-shadow-md font-bold tracking-wider"></span>
                </div>
            </div>

        </div>

        <!-- Área de Resultados -->
        <div class="space-y-12">
            
            <!-- Sección Única y Dinámica -->
            <div>
                <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-3">Escala Secuencial <span id="dynamic-scale-label" class="text-lg font-normal text-gray-500 ml-2"></span></h2>
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                    <!-- Light Mode -->
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="text-lg font-semibold mb-6 text-gray-700 flex items-center gap-2">
                            <span class="w-4 h-4 rounded-full bg-white border border-gray-300"></span> Modo Claro (#FFFFFF)
                        </h3>
                        <div id="palette-dynamic-light" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 gap-4">
                            <!-- Swatches injectados vía JS -->
                        </div>
                    </div>
                    <!-- Dark Mode -->
                    <div class="bg-[#3E3946] p-6 md:p-8 rounded-2xl shadow-sm border border-[#2a2631]">
                        <h3 class="text-lg font-semibold mb-6 text-white flex items-center gap-2">
                            <span class="w-4 h-4 rounded-full bg-[#3E3946] border border-gray-500"></span> Modo Oscuro (#3E3946)
                        </h3>
                        <div id="palette-dynamic-dark" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 gap-4">
                            <!-- Swatches injectados vía JS -->
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- UTILIDADES ---
        const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;
            let c = (1 - Math.abs(2 * l - 1)) * s,
                x = c * (1 - Math.abs(((h / 60) % 2) - 1)),
                m = l - c / 2,
                r = 0, g = 0, b = 0;

            if (0 <= h && h < 60) { r = c; g = x; b = 0; }
            else if (60 <= h && h < 120) { r = x; g = c; b = 0; }
            else if (120 <= h && h < 180) { r = 0; g = c; b = x; }
            else if (180 <= h && h < 240) { r = 0; g = x; b = c; }
            else if (240 <= h && h < 300) { r = x; g = 0; b = c; }
            else if (300 <= h && h < 360) { r = c; g = 0; b = x; }

            r = Math.round((r + m) * 255).toString(16).padStart(2, "0");
            g = Math.round((g + m) * 255).toString(16).padStart(2, "0");
            b = Math.round((b + m) * 255).toString(16).padStart(2, "0");

            return "#" + (r + g + b).toUpperCase();
        }

        // --- MATEMÁTICA DINÁMICA DE SALTOS ---
        function generateDynamicScale(steps, isDark) {
            // Límites fijos asegurados para mantener contraste de fondo
            const startL = isDark ? 15 : 10;
            const endL = isDark ? 95 : 90;
            
            // Ajuste de Saturación (+15% en los tonos oscuros, -15% en los claros para compensar lavado visual)
            const startS = 15;
            const endS = -15;

            const lumArray = [];
            const satArray = [];

            // Distancia del salto (equidistante según N pasos)
            const stepL = (endL - startL) / (steps - 1);
            const stepS = (endS - startS) / (steps - 1);

            for (let i = 0; i < steps; i++) {
                lumArray.push(startL + (stepL * i));
                satArray.push(startS + (stepS * i));
            }
            
            return { lumArray, satArray };
        }

        // --- RENDERIZADO DOM ---
        function renderSwatch(container, h, s, l, stepIndex, isDark, prevL = null) {
            const hex = hslToHex(h, s, l);
            
            const card = document.createElement('div');
            const cardBorderColor = isDark ? 'border-transparent shadow-md' : 'border-gray-200 shadow-sm';
            card.className = `flex flex-col overflow-hidden rounded-xl border transition-transform hover:-translate-y-1 ${cardBorderColor}`;
            
            const colorBox = document.createElement('div');
            colorBox.className = 'h-24 w-full relative p-2';
            colorBox.style.backgroundColor = hex;
            
            const stepBadge = document.createElement('span');
            stepBadge.className = 'absolute top-2 right-2 text-[10px] font-bold bg-white/30 text-white px-2 py-1 rounded backdrop-blur-sm drop-shadow-sm';
            stepBadge.innerText = stepIndex + 1;
            colorBox.appendChild(stepBadge);

            // Indicador de salto de luminosidad
            if (prevL !== null) {
                const deltaL = Math.round(l - prevL);
                const sign = deltaL > 0 ? '+' : '';
                const jumpBadge = document.createElement('span');
                jumpBadge.className = 'absolute bottom-2 left-2 text-[10px] font-bold bg-black/20 text-white px-2 py-1 rounded backdrop-blur-sm drop-shadow-sm flex items-center gap-1';
                jumpBadge.innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> ${sign}${deltaL}% L`;
                colorBox.appendChild(jumpBadge);
            }

            const infoBox = document.createElement('div');
            const infoBg = isDark ? 'bg-black/20' : 'bg-white';
            const infoBorder = isDark ? 'border-t border-white/5' : 'border-t border-gray-100';
            infoBox.className = `p-3 flex flex-col items-center ${infoBg} ${infoBorder}`;
            
            const hexText = document.createElement('span');
            const textColor = isDark ? 'text-gray-100' : 'text-gray-800';
            hexText.className = `text-sm font-bold tracking-wide ${textColor}`;
            hexText.innerText = hex;

            const hslText = document.createElement('span');
            const subTextColor = isDark ? 'text-gray-400' : 'text-gray-500';
            hslText.className = `text-[10px] font-mono mt-1 text-center leading-tight ${subTextColor}`;
            hslText.innerHTML = `H:${Math.round(h)}&deg; S:${Math.round(s)}% L:${Math.round(l)}%`;

            infoBox.appendChild(hexText);
            infoBox.appendChild(hslText);
            card.appendChild(colorBox);
            card.appendChild(infoBox);

            container.appendChild(card);
        }

        // --- LÓGICA PRINCIPAL ---
        function generatePalettes() {
            // 1. Obtener valores de entrada y validar
            let hBase = parseFloat(document.getElementById('in-h').value) || 0;
            let sBase = parseFloat(document.getElementById('in-s').value) || 0;
            let lBase = parseFloat(document.getElementById('in-l').value) || 0;
            let steps = parseInt(document.getElementById('in-steps').value) || 6;

            hBase = clamp(hBase, 0, 360);
            sBase = clamp(sBase, 0, 100);
            lBase = clamp(lBase, 0, 100);
            steps = clamp(steps, 3, 10);

            document.getElementById('dynamic-scale-label').innerText = `(${steps} Pasos)`;

            // 2. Actualizar visualizador de color base
            const baseHex = hslToHex(hBase, sBase, lBase);
            document.getElementById('base-color-box').style.backgroundColor = baseHex;
            document.getElementById('base-color-hex').innerText = baseHex;

            // Contenedores
            const cLight = document.getElementById('palette-dynamic-light');
            const cDark = document.getElementById('palette-dynamic-dark');

            cLight.innerHTML = ''; 
            cDark.innerHTML = '';

            // 3. Generar Arrays de Saltos Dinámicos
            const lightArrays = generateDynamicScale(steps, false);
            const darkArrays = generateDynamicScale(steps, true);

            // 4. Renderizar
            for (let i = 0; i < steps; i++) {
                // Modo Claro
                let sCurrentLight = clamp(sBase + lightArrays.satArray[i], 0, 100);
                let prevLLight = i > 0 ? lightArrays.lumArray[i - 1] : null;
                renderSwatch(cLight, hBase, sCurrentLight, lightArrays.lumArray[i], i, false, prevLLight);
                
                // Modo Oscuro
                let sCurrentDark = clamp(sBase + darkArrays.satArray[i], 0, 100);
                let prevLDark = i > 0 ? darkArrays.lumArray[i - 1] : null;
                renderSwatch(cDark, hBase, sCurrentDark, darkArrays.lumArray[i], i, true, prevLDark);
            }
        }

        // --- LISTENERS ---
        const inputs = ['in-h', 'in-s', 'in-l', 'in-steps'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', generatePalettes);
        });

        // Inicializar
        window.onload = generatePalettes;
    </script>
</body>
</html>
